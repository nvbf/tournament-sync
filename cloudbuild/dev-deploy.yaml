steps:
  - id: deploy-context
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: bash
    args:
      - -ceu
      - |
        echo "Deploy trigger context: action=${_ACTION}"
        echo "Image config defaults: ${_ARTIFACT_REGION}/${_AR_REPO}/${_IMAGE_NAME}"

  - id: deploy-dev
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE_NAME}
      - --image
      - ${_IMAGE_TAG}
      - --region
      - ${_RUN_REGION}
      - --platform
      - managed
      - --service-account
      - ${_RUNTIME_SERVICE_ACCOUNT}
      - --set-env-vars
      - ^|^FIRESTORE_PROJECT_ID=${_FIRESTORE_PROJECT_ID}|PROFIXIO_HOST=${_PROFIXIO_HOST}|FIRESTORE_DATABASE_ID=${_FIRESTORE_DATABASE_ID}|CORS_HOSTS=${_CORS_HOSTS}|HOST_URL=${_HOST_URL}
      - --set-secrets
      - FIRESTORE_CREDENTIAL_JSON=${_FIRESTORE_CREDENTIAL_SECRET}:latest,PROFIXIO_KEY=${_PROFIXIO_KEY_SECRET}:latest,RESEND_KEY=${_RESEND_KEY_SECRET}:latest

substitutions:
  _ARTIFACT_REGION: europe-west1
  _AR_REPO: tournament-sync
  _IMAGE_NAME: tournament-sync
  _BUILD_SERVICE_ACCOUNT: replace-me@project.iam.gserviceaccount.com
  _IMAGE_TAG: latest
  _ACTION: ""
  _RUN_REGION: europe-west1
  _SERVICE_NAME: tournament-sync-dev
  _RUNTIME_SERVICE_ACCOUNT: replace-me@project.iam.gserviceaccount.com
  _FIRESTORE_PROJECT_ID: scoreboard-sandbox-fc7ac
  _PROFIXIO_HOST: demo.profixio.com
  _FIRESTORE_DATABASE_ID: development
  _CORS_HOSTS: http://localhost:5173,https://osvb-scoreboard-dev.web.app
  _HOST_URL: https://osvb-scoreboard-dev.web.app
  _FIRESTORE_CREDENTIAL_SECRET: tournament-sync-firestore-credentials-dev
  _PROFIXIO_KEY_SECRET: tournament-sync-profixio-key
  _RESEND_KEY_SECRET: tournament-sync-resend-key

options:
  logging: CLOUD_LOGGING_ONLY

serviceAccount: projects/$PROJECT_ID/serviceAccounts/${_BUILD_SERVICE_ACCOUNT}
