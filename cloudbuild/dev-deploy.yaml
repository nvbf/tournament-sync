steps:
  - id: deploy-dev-if-build-tag
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: bash
    args:
      - -ceu
      - |
        if [[ "${_ACTION}" != "INSERT" ]]; then
          echo "Skipping dev deploy: action is '${_ACTION}', expected 'INSERT'."
          exit 0
        fi

        if [[ ! "${_IMAGE_TAG}" =~ ^build-[0-9a-f]{40}$ ]]; then
          echo "Skipping dev deploy: image tag '${_IMAGE_TAG}' does not match ^build-[0-9a-f]{40}$."
          exit 0
        fi

        gcloud run deploy "${_SERVICE_NAME}" \
          --image "${_ARTIFACT_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_IMAGE_NAME}:${_IMAGE_TAG}" \
          --region "${_RUN_REGION}" \
          --platform managed \
          --service-account "${_RUNTIME_SERVICE_ACCOUNT}" \
          --set-env-vars "^:^FIRESTORE_PROJECT_ID=${_FIRESTORE_PROJECT_ID}:PROFIXIO_HOST=${_PROFIXIO_HOST}:FIRESTORE_DATABASE_ID=${_FIRESTORE_DATABASE_ID}:CORS_HOSTS=${_CORS_HOSTS}:HOST_URL=${_HOST_URL}" \
          --set-secrets "FIRESTORE_CREDENTIAL_JSON=${_FIRESTORE_CREDENTIAL_SECRET}:latest,PROFIXIO_KEY=${_PROFIXIO_KEY_SECRET}:latest,RESEND_KEY=${_RESEND_KEY_SECRET}:latest"

substitutions:
  _ARTIFACT_REGION: europe-west1
  _AR_REPO: tournament-sync
  _IMAGE_NAME: tournament-sync
  _BUILD_SERVICE_ACCOUNT: replace-me@project.iam.gserviceaccount.com
  _IMAGE_TAG: latest
  _ACTION: ""
  _RUN_REGION: europe-west1
  _SERVICE_NAME: tournament-sync-dev
  _RUNTIME_SERVICE_ACCOUNT: replace-me@project.iam.gserviceaccount.com
  _FIRESTORE_PROJECT_ID: osvb-scoreboard
  _PROFIXIO_HOST: https://replace-me.example.com
  _FIRESTORE_DATABASE_ID: development
  _CORS_HOSTS: https://replace-me.example.com
  _HOST_URL: https://replace-me.example.com
  _FIRESTORE_CREDENTIAL_SECRET: tournament-sync-firestore-credentials-dev
  _PROFIXIO_KEY_SECRET: tournament-sync-profixio-key
  _RESEND_KEY_SECRET: tournament-sync-resend-key

options:
  logging: CLOUD_LOGGING_ONLY

serviceAccount: projects/$PROJECT_ID/serviceAccounts/${_BUILD_SERVICE_ACCOUNT}
